<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBOX CRM — Painel de Usuários</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #06080f;
    --surface:  #0c1120;
    --surface2: #111827;
    --border:   #1e2d45;
    --border2:  #243552;
    --accent:   #00e5a0;
    --accent2:  #0ea5e9;
    --accent3:  #f59e0b;
    --danger:   #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --muted2:   #94a3b8;
    --green:    #10b981;
    --radius:   6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* LOADING */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 24px;
  }
  #loading .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,229,160,.4);
  }
  #loading .logo span { color: var(--text); }
  .loader-bar {
    width: 280px; height: 2px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .loader-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width .3s ease;
    box-shadow: 0 0 12px var(--accent);
  }
  .loader-text {
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .1em;
  }

  /* LAYOUT */
  #app { position: relative; z-index: 1; display: none; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(12,17,32,.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-small {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem; font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo-small span { color: var(--muted2); }
  .badge {
    background: rgba(0,229,160,.1);
    border: 1px solid rgba(0,229,160,.2);
    color: var(--accent);
    font-size: .65rem;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: .1em;
  }
  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-accent {
    background: rgba(0,229,160,.1);
    border-color: rgba(0,229,160,.3);
    color: var(--accent);
  }
  .btn-accent:hover { background: rgba(0,229,160,.2); border-color: var(--accent); color: var(--accent); }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.green::before { background: var(--accent); }
  .stat-card.blue::before  { background: var(--accent2); }
  .stat-card.amber::before { background: var(--accent3); }
  .stat-card.red::before   { background: var(--danger); }
  .stat-label { font-size: .65rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    line-height: 1;
  }
  .stat-card.green .stat-value { color: var(--accent); }
  .stat-card.blue  .stat-value { color: var(--accent2); }
  .stat-card.amber .stat-value { color: var(--accent3); }
  .stat-card.red   .stat-value { color: var(--danger); }
  .stat-sub { font-size: .65rem; color: var(--muted); margin-top: 4px; }

  /* CONTROLS */
  .controls {
    display: flex; gap: 10px; align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 200px; max-width: 360px;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    padding: 8px 10px 8px 32px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--muted); }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    padding: 8px 10px;
    border-radius: var(--radius);
    outline: none;
    cursor: pointer;
  }
  select.filter-select:focus { border-color: var(--accent2); }

  .controls-right { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .result-count {
    font-size: .7rem; color: var(--muted);
    white-space: nowrap;
  }
  .result-count strong { color: var(--muted2); }

  /* COLUMN TOGGLE PANEL */
  .col-toggle-wrap { position: relative; }
  .col-toggle-panel {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px;
    min-width: 220px;
    z-index: 200;
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .col-toggle-panel.open { display: grid; }
  .col-item {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-size: .72rem; color: var(--muted2);
    padding: 4px 6px; border-radius: 4px;
    transition: background .1s;
    user-select: none;
  }
  .col-item:hover { background: var(--border); }
  .col-item input { accent-color: var(--accent); cursor: pointer; }
  .col-item input:checked + span { color: var(--text); }

  /* TABLE WRAPPER */
  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 0 28px 28px;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: .75rem;
    margin-top: 16px;
  }

  thead th {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    border-bottom: 2px solid var(--border2);
    padding: 0;
    position: sticky; top: 0; z-index: 10;
    white-space: nowrap;
  }
  thead th:first-child { border-left: 1px solid var(--border); border-radius: 6px 0 0 0; }
  thead th:last-child  { border-right: 1px solid var(--border); border-radius: 0 6px 0 0; }
  thead th:not(:first-child) { border-left: 1px solid var(--border); }

  .th-inner {
    display: flex; flex-direction: column;
  }
  .th-label {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 12px 8px;
    cursor: pointer;
    font-size: .65rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted2);
    transition: color .15s;
    user-select: none;
  }
  .th-label:hover { color: var(--accent); }
  .th-label.sorted { color: var(--accent); }
  .sort-icon { width: 10px; height: 10px; opacity: .5; flex-shrink: 0; }
  .th-label.sorted .sort-icon { opacity: 1; }

  .col-filter {
    background: var(--surface);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    padding: 5px 10px;
    width: 100%;
    outline: none;
    transition: background .15s;
  }
  .col-filter:focus { background: rgba(14,165,233,.08); }
  .col-filter::placeholder { color: var(--muted); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 9px 12px;
    color: var(--muted2);
    border-left: 1px solid var(--border);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td:first-child { border-left: 1px solid var(--border); }
  td:last-child  { border-right: 1px solid var(--border); }

  td.id-cell { color: var(--accent); font-weight: 600; font-size: .7rem; }
  td.name-cell { color: var(--text); font-size: .72rem; }

  .badge-origin {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 99px;
    font-size: .65rem; font-weight: 500; letter-spacing: .05em;
  }
  .badge-origin.paid     { background: rgba(14,165,233,.15); color: var(--accent2); border: 1px solid rgba(14,165,233,.2); }
  .badge-origin.organic  { background: rgba(16,185,129,.12); color: var(--green);   border: 1px solid rgba(16,185,129,.2); }
  .badge-origin.affiliate{ background: rgba(245,158,11,.12); color: var(--accent3); border: 1px solid rgba(245,158,11,.2); }

  .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    display: inline-block;
  }
  .dot.yes { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.no  { background: var(--border2); }

  .money { color: var(--accent); font-variant-numeric: tabular-nums; }
  .money.zero { color: var(--muted); }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; gap: 8px;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: rgba(12,17,32,.6);
    position: sticky; bottom: 0;
    flex-wrap: wrap;
  }
  .page-info { font-size: .72rem; color: var(--muted); margin-right: auto; }
  .page-info strong { color: var(--muted2); }

  .page-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted2);
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
  .page-btn.active { background: rgba(0,229,160,.1); border-color: rgba(0,229,160,.3); color: var(--accent); }
  .page-btn:disabled { opacity: .3; cursor: not-allowed; }

  .page-size-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: .72rem; padding: 5px 8px; border-radius: 4px; cursor: pointer;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: .8rem; }

  /* NO DATA */
  tbody.loading td { text-align: center; color: var(--muted); padding: 40px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: .75rem;
    padding: 10px 16px;
    border-radius: var(--radius);
    z-index: 9999;
    transform: translateY(20px); opacity: 0;
    transition: all .25s;
    box-shadow: 0 0 20px rgba(0,229,160,.15);
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .table-wrap { padding: 0 12px 16px; }
    header { padding: 14px 16px; }
    .controls { padding: 10px 16px; }
    .pagination { padding: 12px 16px; }
    .stats-bar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">BBOX<span> CRM</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  <div class="loader-text" id="loaderText">Conectando à API...</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-small">BBOX<span> CRM</span></div>
      <span class="badge">USUÁRIOS</span>
    </div>
    <div class="header-right">
      <!-- column toggle -->
      <div class="col-toggle-wrap">
        <button class="btn" id="colToggleBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 9h18M3 15h18"/></svg>
          Colunas
        </button>
        <div class="col-toggle-panel" id="colPanel"></div>
      </div>
      <button class="btn btn-accent" id="exportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
    </div>
  </header>

  <div class="stats-bar" id="statsBar">
    <!-- injected by JS -->
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="globalSearch" placeholder="Buscar em todos os campos...">
    </div>
    <select class="filter-select" id="originFilter">
      <option value="">Todas as origens</option>
      <option value="organic">Orgânico</option>
      <option value="paid">Pago</option>
      <option value="affiliate">Afiliado</option>
    </select>
    <select class="filter-select" id="partnerFilter">
      <option value="">Todos os parceiros</option>
    </select>
    <div class="controls-right">
      <span class="result-count" id="resultCount"></span>
      <button class="btn" id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l18 18M10.5 10.5 9 9m5.5 5.5L13 13"/><circle cx="12" cy="12" r="9"/></svg>
        Limpar
      </button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="mainTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="pagination" id="paginationBar">
    <div class="page-info" id="pageInfo"></div>
    <div id="pageBtns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    <select class="page-size-select" id="pageSizeSelect">
      <option value="50">50 / pág</option>
      <option value="100">100 / pág</option>
      <option value="200">200 / pág</option>
      <option value="500">500 / pág</option>
    </select>
  </div>
</div>

<div id="toast"></div>

<script>
// Dados embutidos estaticamente

// ─── COLUMN DEFINITIONS ──────────────────────────────────────────────
const COLUMNS = [
  { key: 'user_id',         label: 'ID',              visible: true,  get: r => r.user_id },
  { key: 'name',            label: 'Nome',            visible: true,  get: r => r.profile?.name || '' },
  { key: 'email',           label: 'Email',           visible: true,  get: r => r.profile?.email || '' },
  { key: 'phone',           label: 'Telefone',        visible: true,  get: r => r.profile?.phone || '' },
  { key: 'cpf',             label: 'CPF',             visible: false, get: r => r.profile?.cpf || '' },
  { key: 'birth_date',      label: 'Nascimento',      visible: false, get: r => fmtDate(r.profile?.birth_date) },
  { key: 'created_at',      label: 'Cadastro',        visible: true,  get: r => fmtDate(r.profile?.created_at) },
  { key: 'origin_type',     label: 'Origem',          visible: true,  get: r => ({paid:'Pago',organic:'Orgânico',affiliate:'Afiliado',influencer:'Influencer'}[r.origin_info?.type] || r.origin_info?.type || '') },
  { key: 'origin_id',       label: 'Canal',           visible: false, get: r => r.origin_info?.id || '—' },
  { key: 'affiliate_id',    label: 'Afiliado',        visible: false, get: r => r.origin_info?.affiliate_id || '—' },
  { key: 'utm_source',      label: 'UTM Source',      visible: false, get: r => r.origin_info?.utm?.utm_source || '—' },
  { key: 'utm_medium',      label: 'UTM Medium',      visible: false, get: r => r.origin_info?.utm?.utm_medium || '—' },
  { key: 'utm_campaign',    label: 'UTM Campaign',    visible: false, get: r => r.origin_info?.utm?.utm_campaign || '—' },
  { key: 'utm_content',     label: 'UTM Content',     visible: false, get: r => r.origin_info?.utm?.utm_content || '—' },
  { key: 'last_login',      label: 'Último Login',    visible: true,  get: r => fmtDate(r.activity?.last_login_at) },
  { key: 'deposited',       label: 'Depositado',      visible: true,  get: r => r.financials?.total_deposited ?? 0 },
  { key: 'withdrawn',       label: 'Sacado',          visible: false, get: r => r.financials?.total_withdrawn ?? 0 },
  { key: 'cashback',        label: 'Cashback',        visible: true,  get: r => r.financials?.total_cashback ?? 0 },
  { key: 'lost_est',        label: 'Perda Est.',      visible: false, get: r => r.financials?.total_lost_estimated ?? 0 },
  { key: 'partners',        label: 'Parceiros',       visible: true,  get: r => (r.partners_accessed||[]).join(', ') || '—' },
  { key: 'ftd',             label: 'FTD',             visible: false, get: r => (r.cashback_user_active||[]).some(c=>c.is_ftd) ? 'Sim' : 'Não' },
  { key: 'registered_cb',   label: 'Reg. Cashback',   visible: false, get: r => (r.cashback_user_active||[]).some(c=>c.is_registered) ? 'Sim' : 'Não' },
  { key: 'channel',         label: 'Canal Pref.',     visible: false, get: r => r.channel_preference || '—' },
];

const MONEY_KEYS = ['deposited','withdrawn','cashback','lost_est'];

// ─── STATE ────────────────────────────────────────────────────────────
let allData = [];
let filtered = [];
let sortKey = 'created_at';
let sortDir = 'desc';
let page = 1;
let pageSize = 50;
let colFilters = {};

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

let globalQ = '';
let originF = '';
let partnerF = '';

function renderData() {
  renderStats();
  renderBody();
  renderPagination();
  renderCount();
}

// ─── UTILS ───────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toTimeString().slice(0,5);
}
function fmtMoney(v) {
  return v === 0 ? 'R$ 0,00' : 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
}
function norm(str) {
  return String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

// ─── FETCH ───────────────────────────────────────────────────────────
async function fetchData() {
  const fill = document.getElementById('loaderFill');
  const txt  = document.getElementById('loaderText');
  txt.textContent = 'Carregando dados...';
  fill.style.width = '40%';
  await new Promise(r => setTimeout(r, 50));
  let DATA;
  try {
    txt.textContent = 'Conectando à API BBOX...';
    const res = await fetch('/api/users');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
  } catch(err) {
    txt.textContent = 'Erro ao carregar dados: ' + err.message;
    fill.style.backgroundColor = '#ef4444';
    fill.style.width = '100%';
    return;
  }
  allData = DATA.items || [];
  fill.style.width = '100%';
  txt.textContent = `${allData.length.toLocaleString('pt-BR')} usuários carregados`;
  await new Promise(r => setTimeout(r, 300));
}

// ─── STATS ───────────────────────────────────────────────────────────
function renderStats() {
  const total = allData.length;
  let organic=0, paid=0, affiliate=0, withDep=0, withCB=0, totalDep=0;
  for (const r of allData) {
    const t = r.origin_info?.type;
    if (t === 'organic')   organic++;
    else if (t === 'paid') paid++;
    else if (t === 'affiliate') affiliate++;
    if (r.financials?.total_deposited > 0) { withDep++; totalDep += r.financials.total_deposited; }
    if ((r.cashback_user_active||[]).length > 0) withCB++;
  }

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card green">
      <div class="stat-label">Total de Usuários</div>
      <div class="stat-value">${total.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">${filtered.length < total ? filtered.length.toLocaleString('pt-BR')+' filtrados' : 'todos visíveis'}</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Orgânico</div>
      <div class="stat-value">${organic.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">${((organic/total)*100).toFixed(1)}% do total</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Pago</div>
      <div class="stat-value">${paid.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">${((paid/total)*100).toFixed(1)}% do total</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Afiliado</div>
      <div class="stat-value">${affiliate.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">${((affiliate/total)*100).toFixed(1)}% do total</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Com Depósito</div>
      <div class="stat-value">${withDep.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">${((withDep/total)*100).toFixed(1)}% ativos</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Volume Total</div>
      <div class="stat-value" style="font-size:1.1rem">${fmtMoney(totalDep)}</div>
      <div class="stat-sub">total depositado</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Com Cashback</div>
      <div class="stat-value">${withCB.toLocaleString('pt-BR')}</div>
      <div class="stat-sub">vinculados a parceiro</div>
    </div>
  `;
}

// ─── PARTNER FILTER OPTIONS ──────────────────────────────────────────
function populatePartnerFilter() {
  const partners = new Set();
  allData.forEach(r => (r.partners_accessed||[]).forEach(p => partners.add(p)));
  const sel = document.getElementById('partnerFilter');
  [...partners].sort().forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

// ─── FILTER + SORT ───────────────────────────────────────────────────
function applyFilters() {
  const gNorm = norm(globalQ);

  filtered = allData.filter(r => {
    if (originF && r.origin_info?.type !== originF) return false;
    if (partnerF && !(r.partners_accessed||[]).includes(partnerF)) return false;

    // global search
    if (gNorm) {
      const joined = norm(
        [r.user_id, r.profile?.name, r.profile?.email, r.profile?.phone,
         r.profile?.cpf, r.origin_info?.type, r.origin_info?.affiliate_id,
         ...(r.partners_accessed||[])].join(' ')
      );
      if (!joined.includes(gNorm)) return false;
    }

    // per-column filters
    for (const [key, val] of Object.entries(colFilters)) {
      if (!val) continue;
      const col = COLUMNS.find(c=>c.key===key);
      if (!col) continue;
      const cellVal = norm(String(col.get(r)));
      if (!cellVal.includes(norm(val))) return false;
    }

    return true;
  });

  // sort
  const DATE_KEYS = ['created_at','last_login','birth_date'];
  filtered.sort((a, b) => {
    const col = COLUMNS.find(c=>c.key===sortKey);
    if (!col) return 0;
    if (DATE_KEYS.includes(sortKey)) {
      const getRaw = r => sortKey==='created_at' ? r.profile?.created_at
        : sortKey==='last_login' ? r.activity?.last_login_at
        : r.profile?.birth_date;
      const va = getRaw(a) || '', vb = getRaw(b) || '';
      return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    let va = col.get(a), vb = col.get(b);
    if (typeof va === 'number') return sortDir==='asc' ? va-vb : vb-va;
    va = norm(String(va)); vb = norm(String(vb));
    return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  page = 1;
}

// ─── RENDER TABLE HEAD ───────────────────────────────────────────────
const debouncedFilter = debounce(() => { applyFilters(); renderData(); }, 300);

function renderHead() {
  const visible = COLUMNS.filter(c=>c.visible);
  let html = '<tr>';
  visible.forEach(col => {
    const isSorted = sortKey === col.key;
    const icon = isSorted
      ? (sortDir==='asc'
          ? `<svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5m-7 7 7-7 7 7"/></svg>`
          : `<svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14m-7-7 7 7 7-7"/></svg>`)
      : `<svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 9l4-4 4 4M16 15l-4 4-4-4"/></svg>`;

    html += `<th>
      <div class="th-inner">
        <div class="th-label ${isSorted?'sorted':''}" data-sort="${col.key}">
          ${col.label} ${icon}
        </div>
        <input class="col-filter" placeholder="filtrar…" data-col="${col.key}" value="${colFilters[col.key]||''}">
      </div>
    </th>`;
  });
  html += '</tr>';
  document.getElementById('tableHead').innerHTML = html;

  // sort click
  document.querySelectorAll('.th-label').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.sort;
      if (sortKey === key) sortDir = sortDir==='asc'?'desc':'asc';
      else { sortKey = key; sortDir = 'asc'; }
      applyFilters();
      render();
    });
  });

  // col filter input
  document.querySelectorAll('.col-filter').forEach(inp => {
    inp.addEventListener('input', e => {
      colFilters[e.target.dataset.col] = e.target.value;
      debouncedFilter();
    });
  });
}

// ─── RENDER TABLE BODY ───────────────────────────────────────────────
function renderBody() {
  const visible = COLUMNS.filter(c=>c.visible);
  const start = (page-1)*pageSize;
  const slice = filtered.slice(start, start+pageSize);
  const tbody = document.getElementById('tableBody');

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="${visible.length}" style="text-align:center;padding:48px;color:var(--muted);">
      Nenhum resultado encontrado
    </td></tr>`;
    return;
  }

  let html = '';
  slice.forEach(r => {
    html += '<tr>';
    visible.forEach(col => {
      const raw = col.get(r);
      let cell = '';

      if (col.key === 'user_id') {
        cell = `<td class="id-cell">${raw}</td>`;
      } else if (col.key === 'name') {
        cell = `<td class="name-cell">${raw}</td>`;
      } else if (col.key === 'origin_type') {
        const cssClass = r.origin_info?.type || '';
        cell = `<td><span class="badge-origin ${cssClass}">${raw}</span></td>`;
      } else if (MONEY_KEYS.includes(col.key)) {
        const isZero = Number(raw) === 0;
        cell = `<td class="money${isZero?' zero':''}">${fmtMoney(Number(raw))}</td>`;
      } else if (col.key === 'ftd' || col.key === 'registered_cb') {
        const yes = raw === 'Sim';
        cell = `<td><span class="dot ${yes?'yes':'no'}"></span> ${raw}</td>`;
      } else {
        cell = `<td title="${String(raw).replace(/"/g,'&quot;')}">${raw}</td>`;
      }
      html += cell;
    });
    html += '</tr>';
  });

  tbody.innerHTML = html;
}

// ─── PAGINATION ───────────────────────────────────────────────────────
function renderPagination() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / pageSize);
  const start = (page-1)*pageSize+1;
  const end = Math.min(page*pageSize, total);

  document.getElementById('pageInfo').innerHTML = total === 0
    ? `<strong>0</strong> resultados`
    : `Mostrando <strong>${start.toLocaleString('pt-BR')}–${end.toLocaleString('pt-BR')}</strong> de <strong>${total.toLocaleString('pt-BR')}</strong>`;

  // page buttons (show max 7)
  let pages = [];
  if (totalPages <= 7) {
    pages = Array.from({length:totalPages},(_,i)=>i+1);
  } else {
    pages = [1];
    if (page > 3) pages.push('...');
    for (let i=Math.max(2,page-1); i<=Math.min(totalPages-1,page+1); i++) pages.push(i);
    if (page < totalPages-2) pages.push('...');
    pages.push(totalPages);
  }

  let html = `
    <button class="page-btn" id="prevBtn" ${page===1?'disabled':''}>‹</button>`;
  pages.forEach(p => {
    if (p === '...') html += `<span style="color:var(--muted);padding:0 4px;font-size:.7rem;line-height:30px">…</span>`;
    else html += `<button class="page-btn ${p===page?'active':''}" data-p="${p}">${p}</button>`;
  });
  html += `<button class="page-btn" id="nextBtn" ${page===totalPages?'disabled':''}>›</button>`;

  const bar = document.getElementById('pageBtns');
  bar.innerHTML = html;

  bar.querySelectorAll('[data-p]').forEach(btn => {
    btn.addEventListener('click', () => { page = Number(btn.dataset.p); render(); });
  });
  document.getElementById('prevBtn')?.addEventListener('click', () => { page--; render(); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { page++; render(); });
}

// ─── RESULT COUNT ─────────────────────────────────────────────────────
function renderCount() {
  document.getElementById('resultCount').innerHTML =
    `<strong>${filtered.length.toLocaleString('pt-BR')}</strong> de ${allData.length.toLocaleString('pt-BR')}`;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────
function render() {
  renderStats();
  renderHead();
  renderBody();
  renderPagination();
  renderCount();
}

// ─── COLUMN TOGGLE PANEL ─────────────────────────────────────────────
function renderColPanel() {
  const panel = document.getElementById('colPanel');
  panel.innerHTML = COLUMNS.map(col => `
    <label class="col-item">
      <input type="checkbox" ${col.visible?'checked':''} data-col-key="${col.key}">
      <span>${col.label}</span>
    </label>
  `).join('');

  panel.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => {
      const col = COLUMNS.find(c=>c.key===inp.dataset.colKey);
      if (col) { col.visible = inp.checked; render(); }
    });
  });
}

// ─── COLUMN TOGGLE BUTTON ─────────────────────────────────────────────
document.getElementById('colToggleBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('colPanel').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('colPanel').classList.remove('open'));
document.getElementById('colPanel').addEventListener('click', e => e.stopPropagation());

// ─── GLOBAL SEARCH ───────────────────────────────────────────────────
const debouncedGlobal = debounce(() => { applyFilters(); renderData(); }, 300);
document.getElementById('globalSearch').addEventListener('input', e => {
  globalQ = e.target.value;
  debouncedGlobal();
});

// ─── ORIGIN FILTER ───────────────────────────────────────────────────
document.getElementById('originFilter').addEventListener('change', e => {
  originF = e.target.value;
  applyFilters();
  renderData();
});

// ─── PARTNER FILTER ──────────────────────────────────────────────────
document.getElementById('partnerFilter').addEventListener('change', e => {
  partnerF = e.target.value;
  applyFilters();
  renderData();
});

// ─── CLEAR ───────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  globalQ = ''; originF = ''; partnerF = '';
  colFilters = {};
  document.getElementById('globalSearch').value = '';
  document.getElementById('originFilter').value = '';
  document.getElementById('partnerFilter').value = '';
  applyFilters();
  render();
  renderStats();
});

// ─── PAGE SIZE ───────────────────────────────────────────────────────
document.getElementById('pageSizeSelect').addEventListener('change', e => {
  pageSize = Number(e.target.value);
  page = 1;
  render();
});

// ─── CSV EXPORT ──────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const visible = COLUMNS.filter(c=>c.visible);
  const rows = [visible.map(c=>c.label).join(',')];

  filtered.forEach(r => {
    const cells = visible.map(col => {
      let v = col.get(r);
      if (typeof v === 'string' && (v.includes(',') || v.includes('"') || v.includes('\n'))) {
        v = '"' + v.replace(/"/g,'""') + '"';
      }
      return v;
    });
    rows.push(cells.join(','));
  });

  const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bbox-crm-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  showToast(`CSV exportado — ${filtered.length.toLocaleString('pt-BR')} registros`);
});

// ─── TOAST ───────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── INIT ─────────────────────────────────────────────────────────────
(async () => {
  try {
    await fetchData();
    populatePartnerFilter();
    applyFilters();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    renderColPanel();
    renderStats();
    render();
  } catch(err) {
    document.getElementById('loaderText').textContent = 'Erro ao carregar: ' + err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
